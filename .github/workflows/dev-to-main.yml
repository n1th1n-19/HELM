name: Auto PR — dev → main

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — skipping"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "chore: sync dev → main" \
              --body "Automated PR from dev branch push."
          fi
