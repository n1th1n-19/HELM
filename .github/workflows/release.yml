name: Release

on:
  push:
    branches:
      - prod

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: helm-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: helm-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' agent/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: agent
        # GTK cross-compilation unsupported — headless binary; tray requires building from source
        run: cross build --release --no-default-features --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp agent/target/${{ matrix.target }}/release/helm ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' agent/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/n1th1n-19/HELM/main/install.sh | bash
            ```

            See [setup guide](docs/setup.md) for full instructions.

      - name: Bump patch version on main (prepares next release)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          OLD="${{ steps.version.outputs.version }}"
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # Cargo.toml
          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" agent/Cargo.toml

          # build.gradle.kts
          OLD_CODE=$(grep 'versionCode' android/app/build.gradle.kts | grep -o '[0-9]*')
          sed -i "s/versionCode = $OLD_CODE/versionCode = $((OLD_CODE + 1))/" android/app/build.gradle.kts
          sed -i "s/versionName = \"$OLD\"/versionName = \"$NEW\"/" android/app/build.gradle.kts

          # Update Cargo.lock
          cd agent && cargo update --workspace --quiet 2>/dev/null || true && cd ..

          git add agent/Cargo.toml agent/Cargo.lock android/app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore(release): bump version to $NEW"
          git push origin main
