name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: helm-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: helm-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: agent
        # GTK cross-compilation unsupported — ship headless binary; tray requires building from source
        run: cross build --release --no-default-features --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp agent/target/${{ matrix.target }}/release/helm ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/n1th1n-19/HELM/main/install.sh | bash
            ```

            See [setup guide](docs/setup.md) for full instructions.
