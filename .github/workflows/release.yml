name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - prod

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: helm-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: helm-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' agent/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Install cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: agent
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: agent
        # GTK cross-compilation unsupported — headless binary; tray requires building from source
        run: cross build --release --no-default-features --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp agent/target/${{ matrix.target }}/release/helm ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(grep '^version' agent/Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.HELM_KEYSTORE_B64 }}" | base64 -d > /tmp/helm-release.jks

      - name: Build signed release APK
        working-directory: android
        env:
          HELM_KEYSTORE_PATH: /tmp/helm-release.jks
          HELM_KEYSTORE_PASS: ${{ secrets.HELM_KEYSTORE_PASS }}
          HELM_KEY_ALIAS: ${{ secrets.HELM_KEY_ALIAS }}
          HELM_KEY_PASS: ${{ secrets.HELM_KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/helm-${{ steps.version.outputs.version }}.apk

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION="v${{ steps.version.outputs.version }}"

          # Previous tag — fall back to first commit if this is the first release
          PREV=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          # Collect commits grouped by conventional-commit type
          pick() {
            git log $RANGE --pretty=format:"%s" \
              | grep -E "^${1}(\([^)]+\))?(!)?:" \
              | sed -E "s/^${1}(\([^)]+\))?(!)?: //" \
              | sed 's/^/- /'
          }

          BREAKING=$(git log $RANGE --pretty=format:"%s%n%b" | grep -i "BREAKING CHANGE" | sed 's/^/- /' || true)
          FEATS=$(pick "feat")
          FIXES=$(pick "fix")
          PERF=$(pick "perf")
          REFACTOR=$(pick "refactor")
          CHORE=$(pick "chore|build|ci")

          # Build body
          BODY=""

          if [ -n "$BREAKING" ]; then
            BODY="${BODY}## ⚠ Breaking Changes\n${BREAKING}\n\n"
          fi
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## What's New\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$PERF" ]; then
            BODY="${BODY}## Performance\n${PERF}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            BODY="${BODY}## Improvements\n${REFACTOR}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            BODY="${BODY}## Internal\n${CHORE}\n\n"
          fi

          INSTALL="## Install\n\n\`\`\`bash\ncurl -fsSL https://raw.githubusercontent.com/n1th1n-19/HELM/main/install.sh | bash\n\`\`\`\n\nSee [setup guide](docs/setup.md) for full instructions."

          # Write to file to avoid quoting issues with multiline
          printf "${BODY}${INSTALL}" > release_notes.md

          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/*
          body_path: ${{ steps.notes.outputs.notes_file }}

      - name: Bump patch version on main (prepares next release)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          OLD="${{ steps.version.outputs.version }}"
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # Cargo.toml
          sed -i "s/^version = \"$OLD\"/version = \"$NEW\"/" agent/Cargo.toml

          # build.gradle.kts
          OLD_CODE=$(grep 'versionCode' android/app/build.gradle.kts | grep -o '[0-9]*')
          sed -i "s/versionCode = $OLD_CODE/versionCode = $((OLD_CODE + 1))/" android/app/build.gradle.kts
          sed -i "s/versionName = \"$OLD\"/versionName = \"$NEW\"/" android/app/build.gradle.kts

          # Update Cargo.lock
          cd agent && cargo update --workspace --quiet 2>/dev/null || true && cd ..

          git add agent/Cargo.toml agent/Cargo.lock android/app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore(release): bump version to $NEW"
          git push origin main
